name: Build Windows Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'

      - name: Build Fat-JAR
        run: mvn clean package -q

      - name: Download JavaFX jmods for Windows
        shell: pwsh
        run: |
          $url = "https://download2.gluonhq.com/openjfx/24.0.2/openjfx-24.0.2_windows-x64_bin-jmods.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\javafx-jmods.zip"
          Expand-Archive "$env:RUNNER_TEMP\javafx-jmods.zip" -DestinationPath "$env:RUNNER_TEMP\javafx"
          echo "JAVAFX_JMODS=$env:RUNNER_TEMP\javafx\javafx-jmods-24.0.2" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Windows Installer (.exe)
        shell: pwsh
        run: |
          jpackage `
            --type EXE `
            --name KarteikartenSystem `
            --app-version 1.0 `
            --vendor KarteikartenSystem `
            --input target `
            --main-jar KarteikartenSystem-fat.jar `
            --main-class gui.Launcher `
            --dest target/installer `
            --module-path "$env:JAVA_HOME\jmods;$env:JAVAFX_JMODS" `
            --add-modules java.se,javafx.controls,javafx.fxml,javafx.graphics,javafx.base,javafx.media `
            --java-options "--enable-native-access=ALL-UNNAMED" `
            --java-options "--add-modules=javafx.controls,javafx.fxml" `
            --win-console `
            --win-dir-chooser `
            --win-shortcut `
            --win-menu `
            --win-menu-group KarteikartenSystem

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: KarteikartenSystem-Windows-Installer
          path: target/installer/*.exe
          retention-days: 30